name: Latest blog post workflow
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull in posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://cldr-steven-matison.github.io/feed.xml"
          custom_tags: "postImage/image/"
          # ADD THESE TWO LINES:
          commas: " "
          stacking: "grid"
          columns: 2
          # THEN YOUR TEMPLATE:
          template: |
            <div align="center">
              <a href="$url">
                <img src="$postImage" width="100%" style="border-radius: 6px; border: 1px solid #30363d;" />
                <br />
                <strong>$title</strong>
              </a>
            </div>