name: Latest blog post workflow
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://cldr-steven-matison.github.io/feed.xml"
          custom_tags: "postImage/image/"
          max_post_count: 5
          # These two lines help prevent the "code box" glitch
          description_max_words: 30
          tag_post_pre_newline: false
          template: |
            <table>
              <tr>
                <td width="200" valign="top">
                  <a href="$url">
                    <img src="$postImage" width="200" style="border-radius: 6px; border: 1px solid #30363d;" alt="$title" />
                  </a>
                </td>
                <td align="left" valign="top">
                  <a href="$url" style="text-decoration: none; color: #58a6ff; font-family: sans-serif; font-size: 16px; font-weight: 600;">
                    $title
                  </a>
                  <p style="color: #8b949e; font-size: 14px; margin-top: 4px;">
                    $description
                  </p>
                </td>
              </tr>
            </table>