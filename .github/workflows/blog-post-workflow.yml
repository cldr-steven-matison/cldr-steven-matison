name: Latest blog post workflow
on:
  push:
    branches:
      - main
  schedule:
    # Runs once a day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://cldr-steven-matison.github.io/feed.xml"
          custom_tags: "postImage/image/"
          max_post_count: 4
          # We use "template" to define the div structure
          template: |
            <div style="display: inline-block; width: 48%; min-width: 300px; height: 160px; vertical-align: top; margin-bottom: 12px; margin-right: 8px; border: 1px solid #30363d; border-radius: 6px; padding: 16px; background-color: transparent; box-sizing: border-box;">
              <div style="display: flex; flex-direction: column; height: 100%;">
                <a href="$url" style="text-decoration: none; color: #58a6ff; font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.5;">
                  $title
                </a>
                <div style="margin-top: auto;">
                  <a href="$url">
                    <img src="$postImage" style="width: 120px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; border: 1px solid #30363d;" alt="$title" />
                  </a>
                </div>
              </div>
            </div>