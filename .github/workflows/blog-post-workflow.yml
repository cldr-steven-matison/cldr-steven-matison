name: Latest blog post workflow
on:
  push:
    branches:
      - main
  schedule:
    # Runs once a day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://cldr-steven-matison.github.io/feed.xml"
          custom_tags: "postImage/image/"
          max_post_count: 4
          # We use "template" to define the div structure
          template: |
            <table border="0" style="border: 1px solid #30363d; border-radius: 6px; width: 100%; margin-bottom: 10px; border-collapse: separate; padding: 10px;">
              <tr>
                <td width="200px" valign="top">
                  <a href="$url">
                    <img src="$postImage" width="200px" style="border-radius: 4px; border: 1px solid #30363d;" alt="$title" />
                  </a>
                </td>
                <td align="left" valign="top" style="padding-left: 15px;">
                  <a href="$url" style="text-decoration: none; color: #58a6ff; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size: 16px; font-weight: 600;">
                    $title
                  </a>
                  <p style="color: #8b949e; font-size: 14px; margin-top: 8px; line-height: 1.4;">
                    
                  </p>
                </td>
              </tr>
            </table>