name: Latest blog post workflow
on:
  push:
    branches:
      - main
  schedule:
    # Runs once a day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://cldr-steven-matison.github.io/feed.xml"
          custom_tags: "postImage/image/"
          max_post_count: 4
          # We use "template" to define the div structure
          template: |
            <div style="display: inline-block; width: 48%; min-width: 280px; vertical-align: top; margin-bottom: 20px; border: 1px solid #30363d; border-radius: 6px; padding: 12px; background-color: transparent;">
              <a href="$url" style="text-decoration: none;">
                <strong style="font-size: 16px;">$title</strong>
              </a>
              <br /><br />
              <a href="$url">
                <img src="$postImage" style="width: 200px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; border: 1px solid #30363d;" alt="$title" />
              </a>
            </div>