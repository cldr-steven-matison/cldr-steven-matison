name: Latest blog post workflow
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull in posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://cldr-steven-matison.github.io/feed.xml"
          custom_tags: "postImage/image/"
          # ADD THESE TWO LINES:
          commas: " "
          stacking: "grid"
          columns: 2
          # THEN YOUR TEMPLATE:
          template: |
            <table border="0">
              <tr>
                <td width="50%" valign="top">
                  <a href="$url">
                    <img src="$postImage" style="width:100%; border-radius: 6px; border: 1px solid #30363d;" alt="$title" />
                  </a>
                  <br />
                  <a href="$url">
                    <img src="https://img.shields.io/badge/-Blog%20Post-gray?style=flat-square" alt="tag" />
                  </a>
                  <br />
                  <a href="$url"><strong>$title</strong></a>
                </td>
              </tr>
            </table>