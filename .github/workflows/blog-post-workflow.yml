name: Latest blog post workflow
on:
  push:
    branches:
      - main
  schedule:
    # Runs once a day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://cldr-steven-matison.github.io/feed.xml"
          custom_tags: "postImage/image/"
          max_post_count: 4
          # We use "template" to define the div structure
          template: |
            <td width="50%" align="left" valign="top">
              <div style="border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin: 5px; height: 180px;">
                <a href="$url" style="text-decoration: none; color: #58a6ff; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size: 14px; font-weight: 600;">
                  $title
                </a>
                <p></p>
                <a href="$url">
                  <img src="$postImage" width="180px" style="border-radius: 6px; border: 1px solid #30363d;" alt="$title" />
                </a>
              </div>
            </td>